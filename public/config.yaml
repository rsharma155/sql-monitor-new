servers:
  - type: sqlserver
    label: SQL Server
    instances:
      - name: PROD-SQL-01
        host: localhost
        port: 1433
        user: sa
        databases:
          - master
          - SalesDB
          - HR_Data
      - name: DEV-SQL-01
        host: localhost
        port: 1433
        user: sa
        databases:
          - master
          - TestDB
  - type: postgres
    label: PostgreSQL
    instances:
      - name: pg-cluster-prod
        host: localhost
        port: 5432
        user: postgres
        databases:
          - postgres
          - app_db
          - analytics
